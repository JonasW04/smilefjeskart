name: Update tilsyndata

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Restore geocode cache
        uses: actions/cache@v4
        with:
          path: data/geocode-cache.json
          key: geocode-cache-${{ github.run_id }}
          restore-keys: geocode-cache-

      - name: Build tilsyndata
        run: npm run build:data

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/tilsyn.geojson public/tilsyn-diff.json public/tilsyn-meta.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update tilsyndata $(date -u +%Y-%m-%d)"
            git push
          fi
